<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Record Shelf</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Colors */
      --bg-primary: #1a1008;
      --bg-dark-overlay: rgba(0, 0, 0, 0.8);
      --accent-warm: #d4a574;
      --accent-burnt: #c68642;
      --text-light: #f5e6c8;
      --text-muted: #b8956a;
      --spotify-green: #1DB954;
      --border-aged: #6b5344;

      /* Typography */
      --font-display: 'Playfair Display', serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font-body);
      color: var(--text-light);
      background-color: var(--bg-primary);
      overflow-x: hidden;
    }

    body {
      background-image:
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="100" height="100" fill="%231a1008" /><rect width="100" height="100" fill="%23000000" opacity="0.02" filter="url(%23noise)" /></svg>');
      background-size: 100px 100px;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--border-aged);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* Album Grid */
    .album-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
      .album-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    @media (min-width: 1024px) {
      .album-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (min-width: 1400px) {
      .album-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    /* Album Card */
    .album-card {
      position: relative;
      aspect-ratio: 1;
      cursor: pointer;
      overflow: hidden;
      border: 2px solid var(--border-aged);
      background-color: #2a1810;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow:
        inset 0 0 0 1px rgba(212, 165, 116, 0.1),
        0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .album-card:hover {
      transform: scale(1.04);
      box-shadow:
        inset 0 0 0 1px rgba(212, 165, 116, 0.2),
        0 15px 40px rgba(198, 134, 66, 0.3),
        0 0 30px rgba(198, 134, 66, 0.2);
    }

    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .album-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .album-card:hover .album-card-overlay {
      opacity: 1;
    }

    .overlay-text {
      color: var(--text-light);
    }

    .overlay-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }

    .overlay-artist {
      font-size: 0.85rem;
      color: var(--accent-warm);
    }

    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--bg-dark-overlay);
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }

    .modal {
      background-color: #2a2018;
      border: 2px solid var(--border-aged);
      max-width: 900px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      display: flex;
      gap: 2rem;
      padding: 2rem;
      border-radius: 2px;
      animation: slideIn 0.3s ease;
      transform: scale(1);
      opacity: 1;
    }

    @keyframes slideIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .modal {
        flex-direction: column;
        gap: 1.5rem;
        padding: 1.5rem;
        width: 95%;
      }
    }

    .modal-image {
      flex-shrink: 0;
      width: 300px;
      aspect-ratio: 1;
    }

    @media (max-width: 768px) {
      .modal-image {
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
      }
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 1px solid var(--border-aged);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .modal-info h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .modal-meta {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .modal-meta span {
      display: inline-block;
      margin-right: 1rem;
    }

    .modal-meta .genre {
      color: var(--accent-warm);
    }

    .modal-description {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #d0c4a8;
      margin-bottom: 0.5rem;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .modal-button {
      flex: 1;
      min-width: 160px;
      padding: 0.9rem 1.5rem;
      border: 2px solid var(--border-aged);
      background-color: transparent;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .modal-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(212, 165, 116, 0.1);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }

    .modal-button:hover {
      border-color: var(--accent-warm);
      box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
    }

    .modal-button:hover::before {
      transform: scaleX(1);
    }

    .spotify-btn {
      background-color: var(--spotify-green);
      border-color: var(--spotify-green);
      color: #000;
    }

    .spotify-btn:hover {
      background-color: #1ed760;
      border-color: #1ed760;
      box-shadow: 0 0 20px rgba(29, 185, 84, 0.5);
    }

    .apple-btn {
      background-color: #000000;
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    .apple-btn:hover {
      background-color: #1a1a1a;
      border-color: #ffffff;
      color: #ffffff;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.5);
    }

    .youtube-btn {
      background-color: #FF0000;
      border-color: #FF0000;
      color: #fff;
    }

    .youtube-btn:hover {
      background-color: #cc0000;
      border-color: #cc0000;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }

    /* Track List */
    .track-list-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .track-list-container.active {
      max-height: 600px;
      overflow-y: auto;
      margin-top: 1rem;
    }

    .track-list {
      background-color: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-aged);
      padding: 1rem;
      margin-top: 1rem;
    }

    .track-item {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.8;
      color: #d0c4a8;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid rgba(107, 83, 68, 0.3);
      padding: 0.4rem 0;
    }

    .track-item:last-child {
      border-bottom: none;
    }

    .track-number {
      color: var(--text-muted);
      min-width: 2rem;
    }

    .track-title {
      flex: 1;
      padding: 0 0.5rem;
    }

    .track-duration {
      color: var(--text-muted);
      min-width: 3rem;
      text-align: right;
    }

    /* Close Button */
    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 1.8rem;
      cursor: pointer;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease, transform 0.3s ease;
      z-index: 1001;
    }

    .modal-close:hover {
      color: var(--accent-warm);
      transform: scale(1.2);
    }

    /* Scrollbar styling */
    .track-list-container::-webkit-scrollbar {
      width: 6px;
    }

    .track-list-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .track-list-container::-webkit-scrollbar-thumb {
      background: var(--accent-warm);
      border-radius: 3px;
    }

    .track-list-container::-webkit-scrollbar-thumb:hover {
      background: var(--accent-burnt);
    }

    /* Sort Banner */
    .sort-banner {
      background-color: rgba(26, 16, 8, 0.8);
      border-bottom: 1px solid var(--border-aged);
      padding: 1.5rem 1rem;
      margin-top: 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    .sort-button {
      background: none;
      border: 2px solid var(--accent-warm);
      color: var(--text-light);
      padding: 0.6rem 1.2rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      flex-shrink: 0;
    }

    .sort-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: var(--accent-warm);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }

    .sort-button:hover {
      color: var(--bg-primary);
      border-color: var(--accent-warm);
      box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
    }

    .sort-button:hover::before {
      transform: scaleX(1);
    }

    .sort-dropdown {
      background-color: var(--bg-primary);
      border: 2px solid var(--accent-warm);
      border-left: none;
      z-index: 100;
      max-width: 0;
      overflow: hidden;
      transition: max-width 0.4s ease;
      display: flex;
    }

    .sort-dropdown.active {
      max-width: 1000px;
    }

    .sort-options {
      display: flex;
      flex-direction: row;
      gap: 0;
      padding: 0;
      flex-wrap: nowrap;
    }

    .sort-option {
      display: flex;
      align-items: center;
      cursor: pointer;
      padding: 0.6rem 1.2rem;
      transition: all 0.2s ease;
      border-right: 1px solid rgba(107, 83, 68, 0.3);
      background-color: var(--bg-primary);
      white-space: nowrap;
      height: 100%;
    }

    .sort-option:last-child {
      border-right: none;
    }

    .sort-option:hover {
      background-color: rgba(212, 165, 116, 0.1);
      color: var(--accent-warm);
    }

    .sort-option input[type="radio"] {
      margin-right: 0.6rem;
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--accent-warm);
    }

    .sort-option label {
      cursor: pointer;
      font-size: 0.85rem;
    }

    @media (max-width: 1024px) {
      .sort-dropdown {
        max-width: 600px;
      }

      .sort-dropdown.active {
        max-width: 600px;
      }

      .sort-option {
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
      }
    }

    @media (max-width: 768px) {
      .sort-banner {
        padding: 1rem;
        flex-direction: column;
      }

      .sort-button {
        width: 100%;
        margin-bottom: 0.5rem;
      }

      .sort-dropdown {
        border-left: 2px solid var(--accent-warm);
        border-top: none;
        width: 100%;
        max-width: none;
      }

      .sort-dropdown.active {
        max-width: none;
      }

      .sort-options {
        flex-direction: column;
        width: 100%;
      }

      .sort-option {
        border-right: none;
        border-bottom: 1px solid rgba(107, 83, 68, 0.3);
        padding: 0.8rem 1rem;
        width: 100%;
      }

      .sort-option:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>

  <!-- Sort Banner -->

    <button class="sort-button" id="sortBtn">≡ ORDENAR</button>
    <div class="sort-dropdown" id="sortDropdown">
      <div class="sort-options">

        <div class="sort-option">

        <div class="modal-buttons">

            ▶ SPOTIFY

          <button class="modal-button apple-btn" id="appleMusicLink">
            🎵 APPLE MUSIC
          </button>
          <button class="modal-button youtube-btn" id="youtubeLink">
            ▶ YOUTUBE

          <button class="modal-button" id="trackListBtn">≡ TRACK LIST</button>
        </div>
        <div class="track-list-container" id="trackListContainer">
          <div class="track-list" id="trackList"></div>
        </div>
      </div>
    </div>
  </div>

    // State for sorting
    let sortState = 'default';

    // Initialize the app
    function init() {
      setupSortListeners();
      renderAlbumGrid();
      setupModalListeners();
    }

    // Setup sort event listeners
    function setupSortListeners() {
      // Toggle sort dropdown
      document.getElementById('sortBtn').addEventListener('click', () => {
        document.getElementById('sortDropdown').classList.toggle('active');
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        const sortBtn = document.getElementById('sortBtn');
        const sortDropdown = document.getElementById('sortDropdown');
        if (!e.target.closest('.sort-banner')) {
          sortDropdown.classList.remove('active');
        }
      });

      // Sort options
      document.querySelectorAll('input[name="sort"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          sortState = e.target.value;
          applySort();
        });
      });
    }

    // Apply sort
    function applySort() {
      let sorted = [...albums];

      switch (sortState) {
        case 'alphabetical':
          sorted.sort((a, b) => a.title.localeCompare(b.title));
          break;
        case 'artist':
          sorted.sort((a, b) => a.artist.localeCompare(b.artist));
          break;
        case 'year':
          sorted.sort((a, b) => a.year - b.year);
          break;
        case 'yearDesc':
          sorted.sort((a, b) => b.year - a.year);
          break;
        case 'default':
        default:
          // Keep original order from albums array
          sorted.sort((a, b) => albums.indexOf(a) - albums.indexOf(b));
      }

      renderAlbumGrid(sorted);
    }

    // Render album grid
    function renderAlbumGrid(albumsToRender = albums) {
      const grid = document.getElementById('albumGrid');
      grid.innerHTML = '';

      if (albumsToRender.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-muted);">No albums found matching your criteria</div>';
        return;
      }

      albumsToRender.forEach((album) => {
        // Find the original index for the modal
        const originalIndex = albums.indexOf(album);
        const card = document.createElement('div');
        card.className = 'album-card';
        card.innerHTML = `
          <img src="${album.cover}" alt="${album.title}">
          <div class="album-card-overlay">
            <div class="overlay-text">
              <div class="overlay-title">${album.title}</div>
              <div class="overlay-artist">${album.artist}</div>
            </div>
          </div>
        `;
        card.addEventListener('click', () => openModal(originalIndex));
        grid.appendChild(card);
      });
    }

    // Open modal with album details
    function openModal(albumIndex) {
      const album = albums[albumIndex];
      document.getElementById('modalTitle').textContent = album.title;
      document.getElementById('modalArtist').textContent = album.artist;
      document.getElementById('modalYear').textContent = `• ${album.year}`;
      document.getElementById('modalGenre').textContent = album.genre;
      document.getElementById('modalDescription').textContent = album.description;
      document.getElementById('modalCover').src = album.cover;

      const spotifyLink = document.getElementById('spotifyLink');
      spotifyLink.onclick = (e) => {
        e.preventDefault();
        window.location.href = album.spotifyUri;
      };

      const appleMusicLink = document.getElementById('appleMusicLink');
      appleMusicLink.onclick = (e) => {
        e.preventDefault();
        let appleMusicDestination = album.appleMusicUrl || `https://music.apple.com/search?term=${encodeURIComponent(album.artist + ' ' + album.title)}`;
        const link = document.createElement('a');
        link.href = appleMusicDestination;
        link.target = '_blank';
        link.click();
      };

      const youtubeLink = document.getElementById('youtubeLink');
      youtubeLink.onclick = (e) => {
        e.preventDefault();
        let youtubeDestination = album.youtubeUrl || `https://www.youtube.com/results?search_query=${encodeURIComponent(album.artist + ' ' + album.title)}`;
        const link = document.createElement('a');
        link.href = youtubeDestination;
        link.target = '_blank';
        link.click();
      };

      renderTrackList(album.tracks);

      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('trackListContainer').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Render track list
    function renderTrackList(tracks) {
      const trackList = document.getElementById('trackList');
      trackList.innerHTML = '';

      tracks.forEach(track => {
        if (track.section) {
          const sectionItem = document.createElement('div');
          sectionItem.style.cssText = 'font-weight: 700; color: var(--accent-warm); margin-top: 1rem; margin-bottom: 0.5rem; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;';
          sectionItem.textContent = track.section;
          trackList.appendChild(sectionItem);
        } else {
          const trackItem = document.createElement('div');
          trackItem.className = 'track-item';
          trackItem.innerHTML = `
            <span class="track-number">${String(track.number).padStart(2, '0')}.</span>
            <span class="track-title">${track.title}</span>
            <span class="track-duration">${track.duration}</span>
          `;
          trackList.appendChild(trackItem);
        }
      });
    }

    // Toggle track list visibility
    function toggleTrackList() {
      document.getElementById('trackListContainer').classList.toggle('active');
    }

    // Setup modal event listeners
    function setupModalListeners() {
      const modalOverlay = document.getElementById('modalOverlay');
      const modalClose = document.getElementById('modalClose');
      const trackListBtn = document.getElementById('trackListBtn');

      modalClose.addEventListener('click', closeModal);

      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
          closeModal();
        }
      });

      trackListBtn.addEventListener('click', toggleTrackList);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
          closeModal();
        }
      });
    }

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
